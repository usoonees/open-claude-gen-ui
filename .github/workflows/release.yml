name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, for example v0.1.0
        required: true
      title:
        description: Human-readable release title
        required: false

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      attestations: write
      id-token: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Package release artifact
        run: ./scripts/release-package.sh

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: |
            dist/repo-metadata.tgz
            dist/release-manifest.json
            dist/sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/repo-metadata.tgz

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.title || inputs.tag }}
          files: |
            dist/repo-metadata.tgz
            dist/release-manifest.json
            dist/sbom.spdx.json
