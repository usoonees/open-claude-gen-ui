name: Feature Request
description: Propose a repository-level capability or template improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should this enable?
    validations:
      required: true
  - type: textarea
    id: user_value
    attributes:
      label: User value
      description: Why does this matter for teams using the template?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: Outline the preferred implementation or constraints.
  - type: textarea
    id: context
    attributes:
      label: Related context
      description: Specs, plans, prior art, or external references.
